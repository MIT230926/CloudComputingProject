<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lume Bank — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="signin.css" />
  <style>
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #8899aa;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }
    .btn-microsoft {
      width: 100%;
      padding: 12px;
      background: #2a3a5c;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s;
      text-decoration: none;
    }
    .btn-microsoft:hover {
      background: #344d7a;
    }
    .btn-microsoft svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    .error-msg {
      color: #ff6b6b;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      margin-top: 10px;
      display: none;
    }
    .success-msg {
      color: #6bffb8;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="signin-container">
    <div class="signin-card">

      <div class="brand">
        <h1>Lume Bank</h1>
        <p>Private Banking &amp; Wealth Management</p>
      </div>

      <!-- Azure AD Sign In -->
      <button class="btn-microsoft" onclick="signInWithMicrosoft()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 21 21">
          <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
          <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
          <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
          <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
        </svg>
        Sign in with Microsoft
      </button>

      <div class="divider">or sign in with email</div>

      <!-- Standard login form -->
      <form id="signinForm" onsubmit="handleSignIn(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required />
        </div>
        <button type="submit" class="btn-primary">Sign In</button>
      </form>

      <p class="error-msg" id="errorMsg"></p>
      <p class="success-msg" id="successMsg"></p>

      <p class="signup-link">Don't have an account? <a href="signup.html">Create one</a></p>

    </div>
  </div>

  <script>
    const API = 'http://20.5.146.110:3000';
    const TENANT_ID = 'd1e81dd5-dac1-4171-8066-54aa681f1a13';
    const CLIENT_ID = '42041917-b661-4643-9e12-3063d0fd50ea';
    const REDIRECT_URI = 'https://gray-mushroom-012071d00.7.azurestaticapps.net/signin.html';

    // ── On page load: check if returning from Azure AD with a code ──────────
    window.addEventListener('load', () => {
      // If already logged in, go straight to dashboard
      if (localStorage.getItem('token')) {
        window.location.href = 'dashboard.html';
        return;
      }

      // Check if Azure AD redirected back with an auth code
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      if (code) {
        handleAzureCallback(code);
      }
    });

    // ── Redirect user to Microsoft login ────────────────────────────────────
    function signInWithMicrosoft() {
      const authUrl = new URL(`https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/authorize`);
      authUrl.searchParams.set('client_id', CLIENT_ID);
      authUrl.searchParams.set('response_type', 'code');
      authUrl.searchParams.set('redirect_uri', REDIRECT_URI);
      authUrl.searchParams.set('scope', 'openid profile email');
      authUrl.searchParams.set('response_mode', 'query');
      window.location.href = authUrl.toString();
    }

    // ── Handle the code returned by Azure AD ────────────────────────────────
    async function handleAzureCallback(code) {
      showSuccess('Microsoft sign-in detected, completing login...');
      try {
        const response = await fetch(`${API}/api/auth/azure`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });

        const data = await response.json();

        if (!response.ok) {
          showError(data.error || 'Azure AD login failed');
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);

        // Clean the code from the URL then go to dashboard
        window.history.replaceState({}, document.title, '/signin.html');
        window.location.href = 'dashboard.html';

      } catch (err) {
        showError('Could not connect to server. Please try again.');
      }
    }

    // ── Standard email/password login ───────────────────────────────────────
    async function handleSignIn(e) {
      e.preventDefault();
      hideMessages();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const response = await fetch(`${API}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) {
          showError(data.error || 'Login failed');
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('username', data.username);
        window.location.href = 'dashboard.html';

      } catch (err) {
        showError('Could not connect to server. Is the backend running?');
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideMessages() {
      document.getElementById('errorMsg').style.display = 'none';
      document.getElementById('successMsg').style.display = 'none';
    }
  </script>

</body>
</html>
